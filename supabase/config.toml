project_id = "aed-pred"

[api]
enabled = true
schemas = ["public", "graphql_public"]

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
enable_anonymous_sign_ins = true

[functions.wait-session-start]
verify_jwt = true
[functions.wait-session-get]
verify_jwt = true
[functions.wait-session-event]
verify_jwt = true
[functions.wait-session-recover]
verify_jwt = true
[functions.wait-session-delete]
verify_jwt = true

[functions.health-check]
enabled = true
verify_jwt = false
import_map = "./functions/health-check/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/health-check/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/health-check/*.html" ]
